<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px;
            background-color: rgb(27, 10, 43);
            color: white;
            flex-direction: column;
            gap: 20px;
            text-align: center;
            word-break: break-all;
        }
       body > h1{
            background: blueviolet;
            width: 100%;
            padding-top: 30px;
            padding-bottom: 30px;
            text-align: center;
            border-radius: 10px;
        }
        .one{
            background: rgb(50, 29, 70);
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            justify-content: center;
            align-items: center;
            width: 400px;
            height: 400px;
            border: blueviolet 2px solid;
        }
        img{
            width: 200px;
            rotate: -90deg;
            border: 3px solid blueviolet;
            border-radius: 20px;
        }
        a{
            margin-top: -20px;
            color:blueviolet;
            text-decoration: none;
            font-weight: bold;
        }
        @media screen and (max-width: 500px)
        {
            .one{
                width: 95%;
            }
        }
        @media screen and (max-width: 300px)
        {
            .one > img{
                width: 130px;
            }
        }
    </style>
</head>
<body>
    <h1>English <span>Skill</span></h1>
    <div class="one">
        <h1>First Certificate</h1>
        <img src="quran1.jpg" alt="">
        <a href="quran1.jpg" >Check Certificate</a>
    </div>
      <div class="one">
        <h1>Second Certificate</h1>
        <img src="quran2.jpg" alt="">
                <a href="quran2.jpg">Check Certificate</a>
    </div>
      <div class="one">
        <h1>Third Certificate</h1>
        <img src="quran3.jpg" alt="">
                <a href="quran3.jpg">Check Certificate</a>
    </div>
    
</body>
</html>
